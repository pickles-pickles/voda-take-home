version: "3.9"

services:
  db:
    image: postgres:16
    container_name: voda-postgres

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

    environment:
      POSTGRES_DB: assets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      #- postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: voda-backend

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/assets
      PORT: 3000

    ports:
      - "3000:3000"
    volumes:
      - ./db:/db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
