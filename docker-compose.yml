version: "3.9"

services:
  db:
    image: postgres:16
    container_name: voda-postgres

    environment:
      POSTGRES_DB: assets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: voda-backend

    depends_on:
      - db

    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/assets
      PORT: 3000

    ports:
      - "3000:3000"

volumes:
  postgres_data:
