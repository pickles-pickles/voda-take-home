version: "3.9"

services:
  db:
    image: postgres:16
    container_name: voda-postgres

    environment:
      POSTGRES_DB: assets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
