openapi: 3.0.3

info:
  title: Voda Asset Tracking API
  version: 1.0.0
  description: Asset management API for tracking infrastructure assets.

servers:
  - url: http://localhost:3000

tags:
  - name: Assets

paths:
  /api/assets:
    get:
      tags:
        - Assets
      summary: Get assets
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1

        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20

        - in: query
          name: type
          schema:
            type: string
            enum:
              - pipe
              - hydrant
              - sensor
              - valve

        - in: query
          name: status
          schema:
            type: string
            enum:
              - ok
              - warning
              - critical

        - in: query
          name: lat
          schema:
            type: number

        - in: query
          name: lng
          schema:
            type: number

        - in: query
          name: radiusKm
          schema:
            type: number

      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListResponse"

    post:
      tags:
        - Assets
      summary: Create asset

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"

      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /api/assets/{id}:
    get:
      tags:
        - Assets
      summary: Get asset by id

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Asset found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

        "404":
          description: Asset not found

    put:
      tags:
        - Assets
      summary: Update asset

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"

      responses:
        "200":
          description: Asset updated

        "404":
          description: Asset not found

    delete:
      tags:
        - Assets
      summary: Delete asset

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "204":
          description: Asset deleted

        "404":
          description: Asset not found

components:
  schemas:
    Asset:
      type: object

      properties:
        id:
          type: string
          format: uuid

        name:
          type: string

        type:
          type: string
          enum:
            - pipe
            - hydrant
            - sensor
            - valve

        status:
          type: string
          enum:
            - ok
            - warning
            - critical

        lat:
          type: number

        lng:
          type: number

        installed_at:
          type: string
          format: date-time

        last_inspected_at:
          type: string
          format: date-time
          nullable: true

        notes:
          type: string

    CreateAssetRequest:
      type: object

      required:
        - name
        - type
        - status
        - lat
        - lng
        - installed_at

      properties:
        name:
          type: string

        type:
          type: string
          enum:
            - pipe
            - hydrant
            - sensor
            - valve

        status:
          type: string
          enum:
            - ok
            - warning
            - critical

        lat:
          type: number

        lng:
          type: number

        installed_at:
          type: string
          format: date-time

        last_inspected_at:
          type: string
          format: date-time
          nullable: true

        notes:
          type: string

    AssetListResponse:
      type: object

      properties:
        data:
          type: array

          items:
            $ref: "#/components/schemas/Asset"

        pagination:
          type: object

          properties:
            page:
              type: integer

            pageSize:
              type: integer

            total:
              type: integer